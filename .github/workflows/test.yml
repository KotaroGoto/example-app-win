name: Test

on:
  push:
  pull_request:

env:
  # ▼ 修正1：LaravelにMySQLサービスへ接続させるための情報を追加
  DB_CONNECTION: mysql
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: testing
  DB_USERNAME: sail
  DB_PASSWORD: password
  MAIL_FROM_ADDRESS: info@example.com

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: 'mysql:8.4'
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: 'testing'
          MYSQL_USER: ${{ env.DB_USERNAME }}
          MYSQL_PASSWORD: ${{ env.DB_PASSWORD}}
          MYSQL_ALLOW_EMPTY_PASSWORD: 1
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: '8.5'
          tools: composer:v2
      - uses: actions/checkout@v4

      # ▼ 修正2：.env.testing だけでなく、基盤となる .env も作成する
      - name: Copy .env
        run: |
          cp .env.example .env
          cp .env.example .env.testing

      # ▼ 修正3：--no-scripts を削除してパッケージディスカバリーを実行させる
      # （※存在しないcacheステップを参照していた if 条件も削除しました）
      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-progress --prefer-dist

      # ▼ 修正4：キーの生成を両方のファイルに適用する
      - name: Generate key
        run: |
          php artisan key:generate
          php artisan key:generate --env testing

      - name: Set hostname
        run: sudo echo "127.0.0.1 mysql" | sudo tee -a /etc/hosts
        
      - name: Execute tests (Unit and Feature tests) via PHPUnit
        run: vendor/bin/phpunit
        
      - name: Execute code style checks via Pint
        run: vendor/bin/pint
        
      - name: Execute static analysis via PHPStan
        run: vendor/bin/phpstan